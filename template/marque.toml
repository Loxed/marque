title = Marque
description = Built with Marque
layout = sidebar
theme = comte
width = normal
align = center
repo = https://github.com/Loxed/marque
summary = false

# Marque config
#
# repo (optional):
#   repository url shown in the shared footer
#
# layout options:
#   topnav    -> top navigation layout
#   sidebar   -> mdbook-like left sidebar layout
#
# align options:
#   left      -> pin content column to the left
#   center    -> center content column
#   right     -> pin content column to the right
#
# summary options:
#   true      -> show the page summary rail by default
#   false     -> hide it by default unless a page enables it
#
# theme options (built-in):
#   comte, elmental, gouda, pycorino, rubyola, rustique
#   legacy/default, legacy/destiny, legacy/elmental
#   legacy/gruyere, legacy/javarti, legacy/mida
#   legacy/pycorino, legacy/rustique
