<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ document_title }}</title>

<meta name="description" content="{{ description }}">

<!-- 16x16 and 32x32 PNG favicons -->
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">

<!-- Web manifest for PWA support -->
<link rel="manifest" href="/favicon/site.webmanifest">

<!-- Fallback for .ico (optional) -->
<link rel="icon" href="/favicon/favicon.ico">

<!-- Stylesheets -->
<link rel="stylesheet" href="{{ common_css }}">
<link rel="stylesheet" href="{{ layout_css }}">
<link rel="stylesheet" id="mq-theme-stylesheet" href="{{ theme_css }}">
<script>
window.__mqThemeConfig = {{ theme_switcher_config_json }};
(function () {
  var config = window.__mqThemeConfig;
  if (!config || !config.canSwitch || !config.themes) return;

  var selected = config.pageTheme || config.defaultTheme;
  try {
    var stored = window.localStorage && window.localStorage.getItem(config.storageKey);
    if (stored && config.themes[stored]) selected = stored;
  } catch (_) {}

  var theme = config.themes[selected];
  var link = document.getElementById('mq-theme-stylesheet');
  if (!theme || !theme.href || !link) return;

  link.href = theme.href;
  link.setAttribute('data-theme-name', selected);
  document.documentElement.setAttribute('data-mq-theme', selected);
}());
</script>
</head>

<body>
  <!-- Header -->
  {{> partials/header }}

  <!-- Search Container -->
  {{> partials/search }}

  <!-- Main Content -->
  <div class="mq-page-shell" id="mq-page-shell"{{ page_summary_attr }}{{ page_main_style }}>
    <main class="mq-main">
      <!-- dynamic mq content -->
      {{ content }}
      <!-- bottom previous/next navigation -->
      {{ page_nav }}
    </main>
    <!-- Sidebar summary (optional) -->
    {{> partials/summary }}
  </div>
  
  <!-- Footer -->
  <footer class="mq-footer">
    <!-- Remove if you wish, keeping it brings visibility to Marque :) -->
    <span class="mq-footer-built">Built with <a href="https://getmarque.pages.dev">Marque</a></span>
    
    <!-- Repo button (Optional) -->
    <span class="mq-footer-repo"{{ footer_repo_hidden }}>  
      <a class="mq-footer-repo-link" href="{{ repo }}" aria-label="Open repository">
        {{> partials/icons/github }}
      </a>
    </span>
</footer>

  <script src="/index.js"></script>
</body>
</html>
