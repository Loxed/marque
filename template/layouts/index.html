<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ document_title }}</title>

<meta name="description" content="{{ description }}">
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<link rel="stylesheet" href="{{ layout_css }}">
<link rel="stylesheet" href="{{ theme_css }}">
</head>
<body>

  <!-- Navigation Bar (Works with topnav and sidebar) -->
  <nav class="mq-nav">
    <a class="mq-nav-brand" href="/">{{ site_title }}</a>
    <button class="mq-nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation" onclick="mqToggleNav(this)">☰</button>
    <div class="mq-nav-links">
      {{ nav }}
    </div>
  </nav>

  <!-- main content in which .mq files are injected -->
  <main class="mq-main"{{ page_main_style }}>
    {{ content }}
    {{ page_nav }}
  </main>

  <!-- footer at the bottom of every page -->
  <footer class="mq-footer">
    <span class="mq-footer-built">Built with <a href="https://github.com/Loxed/marque">Marque</a></span>
    <span class="mq-footer-repo"{{ footer_repo_hidden }}>
      <a class="mq-footer-repo-link" href="{{ repo }}" aria-label="Open repository">
        <svg class="mq-footer-repo-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3"></path>
          <path d="M15 22v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77 5.44 5.44 0 0 0 3.5 8.5c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
      </a>
    </span>
  </footer>

  <script src="/index.js"></script>
</body>
</html>
